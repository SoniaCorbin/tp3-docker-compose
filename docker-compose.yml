services:
  database:
    image: mongo:7
    container_name: tp3_database
    volumes:
      - database_data:/data/db
    ports:
      - "27017:27017"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: tp3_api
    environment:
      PORT: 5000
      MONGO_URL: mongodb://database:27017/tp3
    ports:
      - "5000:5000"
    depends_on:
      - database
    volumes:
      - ./api:/app
      - /app/node_modules

volumes:
  database_data: